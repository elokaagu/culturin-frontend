    <path d="M90 160 C330 30, 580 250, 900 120" stroke="#f5d27a" stroke-opacity="0.12" stroke-width="2" fill="none" />

    <rect x="80" y="160" width="125" height="92" rx="12" fill="url(#chip)" />
    <line x1="111" y1="160" x2="111" y2="252" stroke="#8f6820" stroke-opacity="0.7" />
    <line x1="143" y1="160" x2="143" y2="252" stroke="#8f6820" stroke-opacity="0.7" />
    <line x1="174" y1="160" x2="174" y2="252" stroke="#8f6820" stroke-opacity="0.7" />

