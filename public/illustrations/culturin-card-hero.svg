      <stop offset="100%" stop-color="#1d222c" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d27a" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#f5d27a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
